name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter darkdetect protobuf pillow pdfminer.six pypdfium2 tkinterdnd2 openpyxl pandas numpy lxml

      - name: Build EXE
        run: pyinstaller BilingualEditor.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BilingualEditor-Windows
          path: dist/BilingualEditor/
